<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Framework.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-img"><img src="images/__20260324_144214_0000.png" alt=""></div>
            </div>
            <div class="begain">
                    <i class="fa-solid fa-user begain-items"></i>
                    <i class="fa-solid fa-envelope begain-items"></i>
                    <p class="begain-items">Dr. Mahmoud Hussein</p>
                    <i class="fa-solid fa-chevron-down begain-items"></i>
            </div>
        </div>
        <div class="sidebar-content">
                <div class="sidebar">
                    <div class="items">
                        <ul>
                            <li><i class="fa-solid fa-chart-bar"></i>Dashbord</li>
                            <li><i class="fa-solid fa-envelope"></i>Appointment</li>
                            <li><i class="fa-solid fa-bed"></i>Patients</li>
                            <li><i class="fa-solid fa-bed"></i>Messages</li>
                            <li><i class="fa-solid fa-bed"></i>Repot</li>
                            <li><i class="fa-solid fa-gear"></i>Setting</li>
                        </ul>
                    </div>
            </div>
            <div class="content">
                <div class="start">
                    <p>Welcome, Dr. Mahmoud Hussein!</p>
                    <span>Good to see you again</span>
                </div>
                <div class="content-center">
                    <div class="bg-eee m-0 p-10 rad-10">
                        <h2><span class="f-40 mt--20 c-bmi text-shadow">BMI</span> Calculate</h2>
                        <div class="flex-center p-10">
                            <div class="betwen-flex j-center flex-column w-full">
                                <input id="height" type="number" placeholder="Height (cm)" class="input-bmi">
                                <input id="weight" type="number" placeholder="Weight (kg)" class="input-bmi">
                                <button id="calc" class="btn-bmi">Calculate</button>
                                <div class="result-card">
                                    <h3>Your BMI is:</h3>
                                    <hr>
                                    <div id="result"></div>
                                </div>
                            </div>
                        </div>
                </div>
                <script src="JS/script.js"></script>
                </div>
                
            </div>
        </div>
        
        <div class="footer">Footer</div>
    </div>

        <div class="w-400 h-250 betwen-flex flex-column bg-burble rad-20 p-20">
            <h1 class="f-50 mt--20 c-insta text-shadow">login info</h1>
            <input type="text" placeholder="UsserName" class="input">
            <input type="password" placeholder="Password" class="input">
            <button class="btn">login</button>
        </div>
    </div>
    <hr> -->
</body>
</html>
